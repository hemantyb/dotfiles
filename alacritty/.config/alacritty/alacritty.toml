import = [
  "~/.config/alacritty/themes/ashes_dark.toml"
]
# dark_pride
[env]
TERM = "xterm-256color"

[font]
size = 13.0

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[cursor]
style = "Block"

[window]
startup_mode = "Windowed"
dynamic_padding = true
opacity = 0.9

[window.padding]
x = 6
y = 0

[window.dimensions]
columns = 90
lines = 25
